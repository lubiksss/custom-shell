# ============================================================
# General
# ============================================================
set-option -g default-shell /bin/zsh

# ============================================================
# Terminal
# ============================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-features ",xterm-ghostty:hyperlinks"
set -g allow-passthrough on

# ============================================================
# Session & Window
# ============================================================
set-option -g detach-on-destroy off
set-option -g renumber-windows on

# Terminal title
set -g set-titles on
set -g set-titles-string "#S: #W"

# New window + auto rename prompt (prefix + c)
bind c new-window \; command-prompt -I "" "rename-window '%%'"

# Move window left/right (prefix + < / >)
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1

# ============================================================
# Pane
# ============================================================
# Toggle synchronize-panes (prefix + S)
bind S setw synchronize-panes

# ============================================================
# Mouse & Input
# ============================================================
set -g mouse on

# Shift+Enter passthrough (for Claude Code multi-line input)
bind -n S-Enter send-keys Escape "[13;2u"

# ============================================================
# Appearance — Github Dark High Contrast
# ============================================================
set -g status-style 'bg=#161b22,fg=#f0f3f6'
set -g status-left-style 'bg=#161b22,fg=#cb9eff,bold'
set -g status-right-style 'bg=#161b22,fg=#9ea7b3'
set -g window-status-current-style 'bg=#161b22,fg=#71b7ff,bold'
set -g window-status-style 'bg=#161b22,fg=#9ea7b3'
set -g pane-border-style 'fg=#7a828e'
set -g pane-active-border-style 'fg=#71b7ff'
set -g message-style 'bg=#161b22,fg=#f0f3f6'
set -g popup-style 'bg=default,fg=default'

# ============================================================
# Fzf session switcher (prefix + s)
# ============================================================
bind-key s display-popup -w 100% -h 100% -B -E "~/.tmux/fzf-switcher.sh"
